<!DOCTYPE html>
  <html lang="fr">

      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>QR Code Generator — DataSWCA</title>
      <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

              font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

              color: #e0e0e0;
              display: flex;
              flex-direction: column;
              align-items: center;
              padding: 30px 20px;
          }

          h1 {
              font-size: 2rem;
              margin-bottom: 6px;
              background: linear-gradient(90deg, #e94560, #0f3460);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
          }

          .subtitle {
              color: #888;
              margin-bottom: 30px;
              font-size: 0.95rem;
          }

          .container {
              display: flex;
              gap: 40px;
              flex-wrap: wrap;
              justify-content: center;
              max-width: 1100px;
              width: 100%;
          }

          .panel {
              background: rgba(255,255,255,0.05);
              backdrop-filter: blur(20px);
              border: 1px solid rgba(255,255,255,0.08);
              border-radius: 20px;
              padding: 30px;
              flex: 1;
              min-width: 300px;
              max-width: 420px;
          }

          .panel h2 {
              font-size: 1.2rem;
              margin-bottom: 20px;
              color: #e94560;
              display: flex;
              align-items: center;
              gap: 8px;
          }

          .field {
              margin-bottom: 16px;
          }

          .field label {
              display: block;
              margin-bottom: 6px;
              font-size: 0.85rem;
              color: #aaa;
              text-transform: uppercase;
              letter-spacing: 0.5px;
          }

          .field input[type="text"],
          .field input[type="tel"],
          .field input[type="email"],
          .field textarea {
              width: 100%;
              padding: 10px 14px;
              border: 1px solid rgba(255,255,255,0.1);
              border-radius: 10px;
              background: rgba(255,255,255,0.06);
              color: #fff;
              font-size: 0.95rem;
              outline: none;
              transition: border-color 0.3s;
          }

          .field input:focus,
          .field textarea:focus {
              border-color: #e94560;
          }

          .field textarea {
              resize: vertical;
              min-height: 60px;
          }

          .color-row {
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 14px;
          }

          .color-row label {
              font-size: 0.85rem;
              color: #aaa;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              flex: 1;
          }

          .color-row input[type="color"] {
              width: 42px;
              height: 34px;
              border: 2px solid rgba(255,255,255,0.15);
              border-radius: 8px;
              cursor: pointer;
              background: transparent;
              padding: 2px;
          }

          .slider-row {
              margin-bottom: 16px;
          }

          .slider-row label {
              display: flex;
              justify-content: space-between;
              font-size: 0.85rem;
              color: #aaa;
              text-transform: uppercase;
              letter-spacing: 0.5px;
              margin-bottom: 6px;
          }

          .slider-row label span {
              color: #e94560;
              font-weight: 600;
          }

          input[type="range"] {
              width: 100%;
              accent-color: #e94560;
              height: 6px;
              -webkit-appearance: none;
              background: rgba(255,255,255,0.1);
              border-radius: 3px;
              outline: none;
          }

          input[type="range"]::-webkit-slider-thumb {
              -webkit-appearance: none;
              width: 18px;
              height: 18px;
              border-radius: 50%;
              background: #e94560;
              cursor: pointer;
              border: 2px solid #fff;
          }

          select {
              width: 100%;
              padding: 10px 14px;
              border: 1px solid rgba(255,255,255,0.1);
              border-radius: 10px;
              background: rgba(255,255,255,0.06);
              color: #fff;
              font-size: 0.95rem;
              outline: none;
              cursor: pointer;
          }

          select option {
              background: #1a1a2e;
              color: #fff;
          }

          .btn-row {
              display: flex;
              gap: 12px;
              margin-top: 24px;
          }

          .btn {
              flex: 1;
              padding: 14px 20px;
              border: none;
              border-radius: 12px;
              font-size: 1rem;
              font-weight: 600;
              cursor: pointer;
              transition: transform 0.2s, box-shadow 0.2s;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 8px;
          }

          .btn:active { transform: scale(0.96); }

          .btn-primary {
              background: linear-gradient(135deg, #e94560, #c23152);
              color: #fff;
              box-shadow: 0 4px 20px rgba(233,69,96,0.3);
          }

          .btn-primary:hover {
              box-shadow: 0 6px 30px rgba(233,69,96,0.5);
              transform: translateY(-1px);
          }

          .btn-secondary {
              background: rgba(255,255,255,0.08);
              color: #e0e0e0;
              border: 1px solid rgba(255,255,255,0.12);
          }

          .btn-secondary:hover {
              background: rgba(255,255,255,0.14);
          }

          #qrcodeDiv {
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 300px;
              background: rgba(0,0,0,0.2);
              border-radius: 20px;
              border: 2px dashed rgba(255,255,255,0.08);
              padding: 20px;
              position: relative;
          }

          #qrcodeDiv canvas {
              border-radius: 16px;
              box-shadow: 0 8px 40px rgba(0,0,0,0.4);
          }

          .placeholder-text {
              color: #555;
              font-size: 1rem;
              text-align: center;
          }

          .logo-preview {
              margin-top: 16px;
              text-align: center;
          }

          .logo-preview img,
          .logo-preview svg {
              width: 60px;
              height: 60px;
              border-radius: 12px;
          }

          .vcard-toggle {
              margin-bottom: 20px;
          }

          .vcard-toggle summary {
              cursor: pointer;
              color: #e94560;
              font-weight: 600;
              font-size: 0.9rem;
              padding: 8px 0;
              user-select: none;
          }

          .vcard-fields {
              display: none;
          }

          .vcard-fields.open {
              display: block;
          }

          @media (max-width: 700px) {
              .container { flex-direction: column; align-items: center; }
              .panel { max-width: 100%; min-width: auto; width: 100%; }
              h1 { font-size: 1.5rem; }
          }

// ─── CHARGEMENT DU LOGO ─────────────────────────────────
async function loadLogo() {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const logoSVG = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
            <circle cx="50" cy="50" r="48" fill="#e94560" stroke="#0f3460" stroke-width="2"/>
            <circle cx="50" cy="50" r="38" fill="#1a1a2e"/>
            <text x="50" y="72" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle">D</text>
            <circle cx="50" cy="25" r="4" fill="#e94560"/>
            <circle cx="50" cy="75" r="4" fill="#e94560"/>
            <polygon points="50,30 53,38 62,38 55,43 57,52 50,47 43,52 45,43 38,38 47,38" fill="#e94560" transform="translate(0, 20)"/>
        </svg>`;
        
        const handleLoad = () => resolve(img);
        const handleError = () => {
            if (img.src.startsWith('file')) {
                const encoded = encodeURIComponent(logoSVG);
                img.src = 'data:image/svg+xml,' + encoded;
            } else {
                reject(new Error('Logo failed to load'));
            }
        };
        
        img.crossOrigin = "Anonymous";
        img.onload = handleLoad;
        img.onerror = handleError;
        img.src = 'logo.png';
    });
}

      // ─── UTILITAIRES DE DESSIN ──────────────────────────────────
      function drawRoundedRect(ctx, x, y, w, h, radius) {
          const r = Math.min(radius, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y,     x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x,     y + h, r);
          ctx.arcTo(x,     y + h, x,     y,     r);
          ctx.arcTo(x,     y,     x + w, y,     r);
          ctx.closePath();
          ctx.fill();
      }

      function drawCircle(ctx, x, y, w, h) {
          const cx = x + w / 2;
          const cy = y + h / 2;
          const r  = Math.min(w, h) / 2;
          ctx.beginPath();
          ctx.arc(cx, cy, r * 0.88, 0, 2 * Math.PI);
          ctx.fill();
      }

        function drawCornerSquare(ctx, x, y, size, color, roundness, bgColor) {
            // Outer square
            ctx.fillStyle = color;
            drawRoundedRect(ctx, x, y, size, size, roundness);

            // Inner cutout
            const innerSize = size * 0.52;
            const ix = x + (size - innerSize) / 2;
            const iy = y + (size - innerSize) / 2;
            ctx.fillStyle = bgColor;
            drawRoundedRect(ctx, ix, iy, innerSize, innerSize, roundness * 1.1);

            // Center dot
            const dotSize = size * 0.22;
            const dx = x + (size - dotSize) / 2;
            const dy = y + (size - dotSize) / 2;
            ctx.fillStyle = color;
            drawRoundedRect(ctx, dx, dy, dotSize, dotSize, roundness * 0.6);
        }

        /**
         * Wrapper around QRCode.toCanvas that returns a Promise.
         * The CDN version of `qrcode` (v1.5.4) uses a callback‑style API.
         * By encapsulating it in a Promise we can `await` it safely.
         * @param {HTMLCanvasElement} canvas – Destination canvas.
         * @param {string} data – Text/vCard to encode.
         * @param {object} options – QRCode options (size, margin, …).
         * @returns {Promise<void>} resolves when drawing finishes.
         */
        function qrToCanvas(canvas, data, options) {
            return new Promise((resolve, reject) => {
                if (!window.QRCode || typeof QRCode.toCanvas !== 'function') {
                    reject(new Error('QRCode library not loaded'));
                    return;
                }
                QRCode.toCanvas(canvas, data, options, err => {
                    if (err) reject(err);
                    else resolve();
                });
            });
        }

      // ─── CONSTRUCTION vCard ─────────────────────────────────────
      function buildVCard() {
          const lines = [
              'BEGIN:VCARD',
              'VERSION:3.0',
              `FN:${vcardName.value || ''}`,
              `ORG:${vcardOrg.value || ''}`,
              `TITLE:${vcardTitle.value || ''}`,
              `TEL:${vcardPhone.value || ''}`,
              `EMAIL:${vcardEmail.value || ''}`,
              `URL:${vcardUrl.value || ''}`,
              `ADR:;;${vcardAddress.value || ''};;;;`,
              'END:VCARD'
          ];
          return lines.join('\n');
      }

      // ─── GENERATION QR CODE ─────────────────────────────────────
      async function generateQRCode() {
          const size        = parseInt(sizeSlider.value);
          const dotColor    = dotColorInput.value;
          const cornerColor = cornerColorInput.value;
          const bgColor     = bgColorInput.value;
          const roundness   = parseInt(roundnessSlider.value);
          const dotStyle    = dotStyleSelect.value;

          qrcodeDiv.innerHTML = '<p class="placeholder-text">⏳ Génération…</p>';
          currentCanvas = null;

          try {
              // 1. Générer le QR brut
              const tempCanvas = document.createElement('canvas');
              tempCanvas.width  = size;
              tempCanvas.height = size;

await qrToCanvas(tempCanvas, buildVCard(), {
                    width: size,
                    margin: 1,
                    color: { dark: '#000000', light: '#ffffff' },
                    errorCorrectionLevel: 'H'
                });

              // 2. Lire les modules
              const tempCtx   = tempCanvas.getContext('2d');
              const imageData = tempCtx.getImageData(0, 0, size, size);
              const data      = imageData.data;

              const moduleSize = size / 25;
              const blockSize  = Math.max(1, Math.floor(moduleSize));
              const cols       = Math.floor(size / blockSize);
              const rows       = Math.floor(size / blockSize);

              // 3. Extraire la grille de modules sombres
              const darkBlocks = [];
              for (let row = 0; row < rows; row++) {
                  darkBlocks[row] = [];
                  for (let col = 0; col < cols; col++) {
                      const cx = col * blockSize + blockSize / 2;
                      const cy = row * blockSize + blockSize / 2;
                      const idx = (Math.floor(cy) * size + Math.floor(cx)) * 4;
                      darkBlocks[row][col] = (data[idx] < 128);
                  }
              }

              // 4. Dessiner le QR personnalisé
              const finalCanvas = document.createElement('canvas');
              finalCanvas.width  = size;
              finalCanvas.height = size;
              const ctx = finalCanvas.getContext('2d');

              // Fond
              ctx.fillStyle = bgColor;
              ctx.fillRect(0, 0, size, size);

              const cornerSize = Math.floor(7 * blockSize);

              // Three finder patterns
              drawCornerSquare(ctx, 0, 0, cornerSize, cornerColor, roundness, bgColor);
              drawCornerSquare(ctx, size - cornerSize, 0, cornerSize, cornerColor, roundness, bgColor);
              drawCornerSquare(ctx, 0, size - cornerSize, cornerSize, cornerColor, roundness, bgColor);

              // Data modules
              for (let row = 0; row < rows; row++) {
                  for (let col = 0; col < cols; col++) {
                      const inCorner =
                          (row < 8 && col < 8) ||
                          (row < 8 && col > cols - 9) ||
                          (row > rows - 9 && col < 8);

                      if (!inCorner && darkBlocks[row][col]) {
                          const x = col * blockSize;
                          const y = row * blockSize;

                          ctx.fillStyle = dotColor;

                          if (dotStyle === 'rounded') {
                              drawRoundedRect(ctx, x, y, blockSize, blockSize, blockSize * 0.38);
                          } else if (dotStyle === 'soft') {
                              drawCircle(ctx, x, y, blockSize, blockSize);
                          } else {
                              ctx.fillRect(x, y, blockSize, blockSize);
                          }
                      }
                  }
              }

// 5. Logo centré
               try {
                   const logoImg = await loadLogo();
                   const logoSize = size * parseFloat(logoSizeSlider.value);
                   const lx = (size - logoSize) / 2;
                   const ly = (size - logoSize) / 2;

                   ctx.save();
                   ctx.shadowBlur = 8;
                   ctx.shadowColor = 'rgba(0,0,0,0.25)';
                   ctx.beginPath();
                   ctx.arc(size / 2, size / 2, logoSize / 2 + 4, 0, 2 * Math.PI);
                   ctx.fillStyle = '#fff';
                   ctx.fill();
                   ctx.lineWidth = Math.max(2, logoSize * 0.03);
                   ctx.strokeStyle = '#000';
                   ctx.stroke();
                   ctx.restore();

                   ctx.save();
                   ctx.shadowBlur = 6;
                   ctx.shadowColor = 'rgba(0,0,0,0.15)';
                   ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
                   ctx.restore();

                   console.log('Logo intégré');
               } catch (err) {
                   console.warn('Logo erreur:', err);
               }

              // 6. Afficher
              qrcodeDiv.innerHTML = '';
              qrcodeDiv.appendChild(finalCanvas);
              currentCanvas = finalCanvas;

          } catch (err) {
              console.error(err);
              qrcodeDiv.innerHTML = `<p class="placeholder-text">❌ Erreur : ${err.message}</p>`;
          }
      }

      // ─── TELECHARGEMENT ─────────────────────────────────────────
function downloadQRCode() {
            if (!currentCanvas) {
                alert('Générez d\'abord le QR Code.');
                return;
            }
            const link = document.createElement('a');
            const now  = new Date();
            const ts   = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            link.download = `QR_Code_DataSWCA_${ts}.png`;
            // Compute export scale based on DPI (default CSS DPI = 72)
            const dpi = parseInt(dpiSlider.value);
            const scale = dpi / 72;
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = Math.round(currentCanvas.width * scale);
            exportCanvas.height = Math.round(currentCanvas.height * scale);
            const exportCtx = exportCanvas.getContext('2d');
            // Preserve image quality when scaling up
            exportCtx.imageSmoothingEnabled = false;
            exportCtx.drawImage(currentCanvas, 0, 0, exportCanvas.width, exportCanvas.height);
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }

        // ─── EVENT LISTENERS ────────────────────────────────────────
        // Size & roundness value display
        sizeSlider.addEventListener('input', () => {
            sizeValue.textContent = sizeSlider.value;
        });
        roundnessSlider.addEventListener('input', () => {
            roundnessValue.textContent = roundnessSlider.value;
        });
        // Logo size value display
        logoSizeSlider.addEventListener('input', () => {
            logoSizeValue.textContent = logoSizeSlider.value;
        });
        // DPI value display
        dpiSlider.addEventListener('input', () => {
            dpiValue.textContent = dpiSlider.value;
        });

        // Buttons
        generateBtn.addEventListener('click', generateQRCode);
        downloadBtn.addEventListener('click', downloadQRCode);

        // Live updates on style change (including DPI)
        [dotColorInput, cornerColorInput, bgColorInput,
        roundnessSlider, dotStyleSelect, sizeSlider, dpiSlider, logoSizeSlider].forEach(el => {
            el.addEventListener('change', generateQRCode);
        });

        // Live updates on vCard change (debounced)
        [vcardName, vcardOrg, vcardTitle, vcardPhone, vcardEmail, vcardUrl, vcardAddress].forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(el._debounce);
                el._debounce = setTimeout(generateQRCode, 600);
            });
        });

        // Génération initiale
        setTimeout(generateQRCode, 200);
  </script>

  </body>
  </html>
